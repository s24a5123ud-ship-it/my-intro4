<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NameLink - 人脈メモアプリ v3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1><i class="fa-solid fa-link"></i> NameLink <span style="font-size: 0.8rem; opacity: 0.7;">v3</span></h1>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="名前や特徴で検索...">
            </div>
            <div class="header-actions">
                <button id="statsBtn" class="btn-icon" title="成績データ"><i class="fa-solid fa-chart-simple"></i></button>
                <button id="settingsBtn" class="btn-icon" title="API設定"><i class="fa-solid fa-gear"></i></button>
                <button id="quizBtn" class="btn-secondary"><i class="fa-solid fa-dice"></i> クイズ</button>
                <button id="addBtn" class="btn-primary"><i class="fa-solid fa-plus"></i> 追加</button>
            </div>
        </div>
    </header>

    <main>
        <div id="emptyState" class="empty-state hidden">
            <i class="fa-regular fa-address-book"></i>
            <p>まだ誰も登録されていません。<br>右上の「追加」ボタンから登録しましょう。</p>
        </div>
        <div id="peopleGrid" class="people-grid">
            <!-- Cards will be generated here by JS -->
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div id="addModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeAddModal">&times;</span>
            <h2 id="modalTitle">新しい人を登録</h2>
            <form id="personForm">
                <div class="form-group">
                    <label for="name">名前 <span class="required">*</span></label>
                    <input type="text" id="name" required placeholder="例: 山田 太郎">
                </div>
                <div class="form-group">
                    <label for="origin">出身</label>
                    <input type="text" id="origin" placeholder="例: 東京都">
                </div>
                <div class="form-group">
                    <label for="affiliation">所属</label>
                    <input type="text" id="affiliation" placeholder="例: 〇〇株式会社 営業部 / テニスサークル">
                </div>
                <div class="form-group">
                    <label for="features">その人の特徴</label>
                    <textarea id="features" rows="4" placeholder="例: コーヒーが好き。いつも笑顔で挨拶してくれる。最近ゴルフを始めたらしい。"></textarea>
                </div>
                <input type="hidden" id="editId">
                <button type="submit" class="btn-primary btn-full">保存する</button>
            </form>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal hidden">
        <div class="modal-content detail-content">
            <span class="close-btn" id="closeDetailModal">&times;</span>
            <div class="detail-header">
                <div class="detail-avatar" id="detailAvatar"></div>
                <h2 id="detailName"></h2>
            </div>
            <div class="detail-body">
                <div class="detail-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <div>
                        <span class="label">出身</span>
                        <p id="detailOrigin">-</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fa-solid fa-building"></i>
                    <div>
                        <span class="label">所属</span>
                        <p id="detailAffiliation">-</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fa-solid fa-user-tag"></i>
                    <div>
                        <span class="label">特徴</span>
                        <p id="detailFeatures" class="features-text">-</p>
                    </div>
                </div>
            </div>
            <div class="detail-actions">
                <button id="editPersonBtn" class="btn-secondary"><i class="fa-solid fa-pen"></i> 編集</button>
                <button id="deletePersonBtn" class="btn-danger"><i class="fa-solid fa-trash"></i> 削除</button>
            </div>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeQuizModal">&times;</span>
            <h2 class="quiz-title"><i class="fa-solid fa-circle-question"></i> この人は誰？</h2>
            
            <div id="quizStateError" class="empty-state hidden">
                <p>クイズを始めるには、最低2人以上の登録とAPIキーの設定が必要です。</p>
            </div>

            <div id="quizLoading" class="empty-state hidden">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p>AIがヒントを生成中...</p>
            </div>

            <div id="quizContainer" class="hidden">
                <div class="quiz-hints-area">
                    <ul id="quizHintsList" class="quiz-hints-list">
                        <!-- AI Hints will be appended here one by one -->
                    </ul>
                    <button id="showNextHintBtn" class="btn-secondary btn-full hint-btn hidden">次のヒントを見る <i class="fa-solid fa-chevron-down"></i></button>
                </div>
                
                <div class="quiz-choices" id="quizChoices">
                    <!-- Choice buttons injected by JS -->
                </div>

                <div id="quizResult" class="quiz-result hidden">
                    <h3 id="quizResultMessage">正解！</h3>
                    <p id="quizResultDetail"></p>
                    <button id="nextQuizBtn" class="btn-primary btn-full">次の問題へ <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeSettingsModal">&times;</span>
            <h2><i class="fa-solid fa-gear"></i> 設定</h2>
            <form id="settingsForm">
                <div class="form-group">
                    <label for="apiKey">Gemini API キー</label>
                    <input type="password" id="apiKey" placeholder="AIの利用に必要なAPIキーを入力">
                    <small class="help-text">Google AI Studioから無料で取得できます。このキーはブラウザにのみ保存されます。</small>
                </div>
                <button type="submit" class="btn-primary btn-full">保存する</button>
            </form>
        </div>
    </div>

    <!-- Stats Modal -->
    <div id="statsModal" class="modal hidden">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-btn" id="closeStatsModal">&times;</span>
            <h2><i class="fa-solid fa-chart-simple"></i> クイズ成績データ</h2>
            
            <div class="stats-overview">
                <div class="stat-box">
                    <div class="stat-label">総プレイ回数</div>
                    <div class="stat-value" id="statTotalGames">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">全体の正答率</div>
                    <div class="stat-value" id="statAccuracy">0%</div>
                </div>
            </div>

            <h3 class="stats-subtitle">人物別データ（苦手な順）</h3>
            <div class="stats-list" id="statsList">
                <!-- Person stats injected here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
